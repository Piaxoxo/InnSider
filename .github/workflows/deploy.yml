name: Deploy to GitHub Pages

# Builds the site on GitHub's runners and publishes to GitHub Pages on every
# push to main (and on demand). Runs on GitHub infra, so it doesn't depend on
# any deploy network access from the dev environment.
#
# ONE-TIME SETUP: repo Settings → Pages → Build and deployment → Source →
# "GitHub Actions". After that this deploys automatically; photo uploads to the
# repo go live on the next push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the latest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (relative base — works at any Pages sub-path / casing)
        run: npm run build
        env:
          BASE_PATH: ./
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
